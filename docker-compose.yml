services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dev
      MYSQL_DATABASE: learning_effect
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Provisions the `workflow` schema + grants for the Workflow SDK world.
      # Runs only on a fresh volume (see docker/mysql-init/01-workflow.sql).
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdev"]
      interval: 5s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel/otel-collector/config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4318:4318" # OTLP HTTP

  tempo:
    image: grafana/tempo:2.7.2
    volumes:
      - ./otel/tempo/config.yml:/etc/tempo.yaml
    command: ["-config.file=/etc/tempo.yaml"]

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./otel/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3001:3000" # Grafana UI (3001 to avoid conflict with Next.js)

volumes:
  mysql-data:
